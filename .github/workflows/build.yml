name: Build and Publish KiwiGen Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to build and publish (e.g., v0.5.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}

    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Release tag must start with 'v' (got: $TAG)"
            exit 1
          fi

          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

  build-macos-arm64:
    needs: [prepare]
    runs-on: macos-latest

    steps:
      - name: Checkout code at release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Download Whisper model
        shell: bash
        run: |
          mkdir -p models
          curl -L -o models/ggml-small.en.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin
          echo "Downloaded Whisper model: $(ls -lh models/ggml-small.en.bin)"

      - name: Install Playwright browsers
        run: npm run install:browsers

      - name: Import code signing certificate
        shell: bash
        run: |
          mkdir -p ~/variables
          echo "${{ secrets.MACOS_CERTIFICATE }}" | base64 --decode > ~/variables/certificate.p12

          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import ~/variables/certificate.p12 -k build.keychain -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          security list-keychains -s build.keychain

          echo "Verifying imported identities:"
          security find-identity -v -p codesigning build.keychain

      - name: Build macOS app (signed & notarized)
        run: npm run build:prod
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ~/variables/certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiwigen-macos-arm64
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 30

  build-windows:
    needs: [prepare]
    runs-on: windows-latest

    steps:
      - name: Checkout code at release tag
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.prepare.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> "$GITHUB_OUTPUT"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Download Whisper model
        shell: bash
        run: |
          mkdir -p models
          curl -L -o models/ggml-small.en.bin https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin
          ls -lh models/ggml-small.en.bin

      - name: Install Playwright browsers
        run: npm run install:browsers

      - name: Build Windows app (unsigned)
        shell: bash
        run: npm run build:prod

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiwigen-windows
          path: release/*.exe
          retention-days: 30

  upload-to-release:
    needs: [prepare, build-macos-arm64, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded artifact structure
        run: ls -R artifacts

      - name: Upload installers to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s nullglob

          files=(
            artifacts/kiwigen-macos-arm64/*
            artifacts/kiwigen-windows/*
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No files found to upload"
            exit 1
          fi

          gh release upload "${{ needs.prepare.outputs.release_tag }}" "${files[@]}" \
            --repo "${{ github.repository }}" \
            --clobber
